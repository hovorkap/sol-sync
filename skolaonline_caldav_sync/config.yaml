name: "SkolaOnline CalDAV Sync"
description: "Synchronizuje domácí úkoly ze SkolaOnline.cz do CalDAV kalendáře (iCloud nebo jiný server)"
version: "0.24.0"
slug: "skolaonline_caldav_sync"
url: "https://github.com/hovorkap/sol-sync"
init: false
startup: services
boot: auto
arch:
  - aarch64
  - amd64
options:
  skolaonline_username: ""
  skolaonline_password: ""
  cal_backend: "icloud"
  icloud_apple_id: ""
  icloud_app_password: ""
  caldav_url: ""
  caldav_username: ""
  caldav_password: ""
  sync_interval: 30
  default_list_name: "Homework"
  reminder_time: "18:00"
  pupils:
    - sol_name: "Surname Firstname"
      strategy: "parse_du"
      list_name: ""
      name_prefix: ""
      include_past: false
schema:
  skolaonline_username: str
  skolaonline_password: str
  cal_backend: list(icloud|caldav)
  icloud_apple_id: "str?"
  icloud_app_password: "str?"
  caldav_url: "url?"
  caldav_username: "str?"
  caldav_password: "str?"
  sync_interval: int
  default_list_name: str
  reminder_time: "str?"
  pupils:
    - sol_name: str
      strategy: list(single|parse_du)
      list_name: "str?"
      name_prefix: "str?"
      include_past: bool
